# ============================================================================
# Ice Truck Tracking — Production Docker Compose
# Cloud-Native IoT Platform with full observability stack
# ============================================================================
version: '3.9'

x-common-env: &common-env
  NODE_ENV: production
  TZ: Asia/Bangkok

services:
  # ── API Gateway ──────────────────────────────────────────
  kong:
    image: kong:3.9-alpine
    environment:
      KONG_DATABASE: 'off'
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_LISTEN: '0.0.0.0:8000, 0.0.0.0:8443 ssl http2'
      KONG_ADMIN_LISTEN: '0.0.0.0:8001'
      KONG_SSL_CERT: /certs/server.crt
      KONG_SSL_CERT_KEY: /certs/server.key
      KONG_LOG_LEVEL: warn
    volumes:
      - ./infra/kong/kong.yml:/etc/kong/kong.yml:ro
      - ./certs:/certs:ro
    ports:
      - '8000:8000'
      - '8443:8443'
    networks:
      - ice-truck-network
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: '0.5', memory: 256M }

  # ── Database (TimescaleDB) ───────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_DB: ice_tracking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_INITDB_ARGS: '--data-checksums'
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./backend/database/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - '5432:5432'
    networks:
      - ice-truck-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits: { cpus: '2', memory: 2G }
        reservations: { cpus: '0.5', memory: 512M }
    command: >
      postgres
        -c shared_preload_libraries=timescaledb
        -c max_connections=200
        -c shared_buffers=512MB
        -c effective_cache_size=1536MB
        -c work_mem=4MB
        -c maintenance_work_mem=128MB
        -c wal_buffers=16MB
        -c checkpoint_completion_target=0.9
        -c random_page_cost=1.1
        -c log_min_duration_statement=200
        -c log_checkpoints=on
        -c log_connections=on
        -c log_disconnections=on
        -c ssl=on
        -c ssl_cert_file=/var/lib/postgresql/server.crt
        -c ssl_key_file=/var/lib/postgresql/server.key

  # ── Connection Pooling (PgBouncer) ───────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@postgres:5432/ice_tracking
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 50
      MIN_POOL_SIZE: 10
      RESERVE_POOL_SIZE: 10
      SERVER_TLS_SSLMODE: prefer
    ports:
      - '6432:6432'
    networks:
      - ice-truck-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: '0.25', memory: 128M }

  # ── Cache (Redis) ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: >
      redis-server
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --appendonly yes
        --appendfsync everysec
        --requirepass ${REDIS_PASSWORD:-}
        --rename-command FLUSHALL ""
        --rename-command FLUSHDB ""
        --rename-command DEBUG ""
    volumes:
      - redis-data:/data
    ports:
      - '6379:6379'
    networks:
      - ice-truck-network
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits: { cpus: '0.5', memory: 512M }

  # ── MQTT Broker (Mosquitto) ──────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    volumes:
      - type: bind
        source: ./infra/mosquitto/mosquitto.conf
        target: /mosquitto/config/mosquitto.conf
        read_only: true
      - ./infra/mosquitto/acl:/mosquitto/config/acl:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
      - ./certs:/mosquitto/certs:ro
    ports:
      - '1883:1883'
      - '8883:8883'
      - '9001:9001'
    networks:
      - ice-truck-network
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: '0.5', memory: 256M }

  # ── Message Queue (Kafka + Zookeeper) ────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zk-data:/var/lib/zookeeper/data
    networks:
      - ice-truck-network
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: '0.25', memory: 256M }

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_BYTES: 1073741824
      KAFKA_NUM_PARTITIONS: 6
    volumes:
      - kafka-data:/var/lib/kafka/data
    ports:
      - '9092:9092'
    networks:
      - ice-truck-network
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: '1', memory: 1G }

  # ── Backend API ──────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    environment:
      <<: *common-env
      PORT: 5000
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres}@pgbouncer:6432/ice_tracking
      REDIS_URL: redis://redis:6379
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      KAFKA_BROKERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET}
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
    ports:
      - '5000:5000'
    networks:
      - ice-truck-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_started
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits: { cpus: '1', memory: 512M }
        reservations: { cpus: '0.25', memory: 128M }
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:5000/api/v1/health']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Dashboard (Next.js) ─────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    environment:
      <<: *common-env
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:5000}
    ports:
      - '3000:3000'
    networks:
      - ice-truck-network
    depends_on:
      - backend
    restart: unless-stopped
    deploy:
      replicas: 2
      resources:
        limits: { cpus: '0.5', memory: 256M }

  # ── Reverse Proxy (Nginx) ───────────────────────────────
  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    ports:
      - '80:80'
      - '443:443'
    networks:
      - ice-truck-network
    depends_on:
      - backend
      - dashboard
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: '0.25', memory: 128M }

  # ── Prometheus ───────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.0
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    ports:
      - '9090:9090'
    networks:
      - ice-truck-network
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: '0.5', memory: 512M }

  # ── Grafana ──────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-worldmap-panel
      GF_SERVER_ROOT_URL: ${GRAFANA_URL:-http://localhost:3001}
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-storage:/var/lib/grafana
    ports:
      - '3001:3000'
    networks:
      - ice-truck-network
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: '0.5', memory: 256M }

  # ── Loki (Log Aggregation) ──────────────────────────────
  loki:
    image: grafana/loki:3.1.0
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    ports:
      - '3100:3100'
    networks:
      - ice-truck-network
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: '0.5', memory: 256M }

  # ── Jaeger (Distributed Tracing) ────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.60
    environment:
      COLLECTOR_OTLP_ENABLED: 'true'
    ports:
      - '16686:16686'
      - '14268:14268'
      - '4317:4317'
      - '4318:4318'
    networks:
      - ice-truck-network
    restart: unless-stopped
    deploy:
      resources:
        limits: { cpus: '0.5', memory: 512M }

volumes:
  pg-data:
    driver: local
  redis-data:
    driver: local
  mosquitto-data:
    driver: local
  mosquitto-log:
    driver: local
  grafana-storage:
    driver: local
  prometheus-data:
    driver: local
  loki-data:
    driver: local
  zk-data:
    driver: local
  kafka-data:
    driver: local

networks:
  ice-truck-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
