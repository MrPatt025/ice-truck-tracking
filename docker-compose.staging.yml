# Docker Compose — Staging Environment
# ─────────────────────────────────────
# Production-like deployment for pre-release validation.
#
# Usage:
#   docker compose -f docker-compose.staging.yml up -d
#   docker compose -f docker-compose.staging.yml down -v
#
# Environment:
#   Copy .env.staging.example to .env.staging and configure.

services:
  # ── PostgreSQL + TimescaleDB (with PgBouncer) ────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ice_staging}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ice_tracking_staging}
    volumes:
      - staging-pg-data:/var/lib/postgresql/data
      - ./backend/database/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
      - ./backend/database/migrations/002_pgbouncer_replica.sql:/docker-entrypoint-initdb.d/002_pgbouncer_replica.sql
    networks:
      - staging-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-ice_staging}']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'

  # ── Redis ────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - staging-redis-data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-staging-redis-pass}
    networks:
      - staging-network
    healthcheck:
      test:
        [
          'CMD',
          'redis-cli',
          '-a',
          '${REDIS_PASSWORD:-staging-redis-pass}',
          'ping',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Eclipse Mosquitto (MQTT) ─────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - '1883:1883'
    volumes:
      - type: bind
        source: ./infra/mosquitto/mosquitto.conf
        target: /mosquitto/config/mosquitto.conf
        read_only: true
      - staging-mosquitto-data:/mosquitto/data
    networks:
      - staging-network
    healthcheck:
      test: ['CMD-SHELL', 'mosquitto_sub -t "$$SYS/#" -C 1 -W 3 || exit 0']
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Backend API (2 replicas) ──────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: staging
      PORT: 5000
      DATABASE_URL: postgresql://${POSTGRES_USER:-ice_staging}:${POSTGRES_PASSWORD:?Required}@postgres:5432/${POSTGRES_DB:-ice_tracking_staging}
      DB_POOL_MAX: 30
      REDIS_URL: redis://:${REDIS_PASSWORD:-staging-redis-pass}@redis:6379
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
      SALT_ROUNDS: 12
      CLIENT_URL: ${CLIENT_URL:-https://staging.ice-truck.local}
      LOG_LEVEL: info
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    networks:
      - staging-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:5000/api/v1/health']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # ── Frontend Dashboard ────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:5000}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://backend:5000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://backend:5000}
    depends_on:
      - backend
    networks:
      - staging-network
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

  # ── Nginx Load Balancer ────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - backend
      - dashboard
    networks:
      - staging-network
    deploy:
      resources:
        limits:
          memory: 128M

  # ── Prometheus ──────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - '9090:9090'
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alerts/alert-rules.yml:/etc/prometheus/alert-rules.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    networks:
      - staging-network

  # ── Grafana ─────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - '3001:3000'
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?Set GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_SERVER_ROOT_URL: ${GRAFANA_URL:-http://localhost:3001}
    volumes:
      - staging-grafana:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus
    networks:
      - staging-network

volumes:
  staging-pg-data:
  staging-redis-data:
  staging-mosquitto-data:
  staging-grafana:

networks:
  staging-network:
    driver: bridge
