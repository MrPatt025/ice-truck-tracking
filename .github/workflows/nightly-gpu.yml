name: Nightly GPU E2E Tests

on:
  schedule:
    - cron: '0 3 * * *' # 3 AM UTC every day
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: nightly-gpu-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.32.1'
  CI: 'true'
  NEXT_TELEMETRY_DISABLED: '1'

permissions:
  contents: read

jobs:
  # ── GPU E2E Tests (Full 3D + WebGL) ─────────────────────
  test-e2e-gpu:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Install Playwright with Chrome
        run: npx playwright install --with-deps chromium

      - name: Run GPU E2E Tests
        run: pnpm --filter @ice-truck/dashboard run test:e2e:gpu
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000
          NEXT_PUBLIC_WS_URL: ws://localhost:5000

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: gpu-playwright-report
          path: dashboard/playwright-report/gpu/
          if-no-files-found: ignore

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: gpu-test-results
          path: dashboard/playwright-results/gpu/
          if-no-files-found: ignore
