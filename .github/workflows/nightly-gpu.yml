name: Nightly GPU E2E Tests

on:
  schedule:
    - cron: '0 3 * * *' # 3 AM UTC every day
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: nightly-gpu-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '10.32.1'
  CI: 'true'
  NEXT_TELEMETRY_DISABLED: '1'

permissions:
  contents: read

jobs:
  # ── GPU E2E Tests (Full 3D + WebGL) ─────────────────────
  test-e2e-gpu:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Install Playwright with Chrome
        run: npx playwright install --with-deps chromium

      - name: Run GPU E2E Tests
        run: pnpm --filter @ice-truck/dashboard run test:e2e:gpu
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000
          NEXT_PUBLIC_WS_URL: ws://localhost:5000

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: gpu-playwright-report
          path: dashboard/playwright-report/gpu/
          if-no-files-found: ignore

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: gpu-test-results
          path: dashboard/playwright-results/gpu/
          if-no-files-found: ignore
