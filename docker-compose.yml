# Docker Compose file for Ice Truck Tracking System

services:
  # ── PostgreSQL + TimescaleDB ────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-ice_tracking}
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./backend/database/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    networks:
      - ice-truck-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - ice-truck-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Eclipse Mosquitto (MQTT) ────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - '1883:1883'
      - '9001:9001'
    volumes:
      - type: bind
        source: ./infra/mosquitto/mosquitto.conf
        target: /mosquitto/config/mosquitto.conf
        read_only: true
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    networks:
      - ice-truck-network
    healthcheck:
      test: ['CMD-SHELL', 'mosquitto_sub -t "$$SYS/#" -C 1 -W 3 || exit 0']
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Backend API ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 5000
      USE_FAKE_DB: 'false'
      DB_SSL: 'false'
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-ice_tracking}
      DB_POOL_MAX: 20
      REDIS_URL: redis://redis:6379
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env}
      SALT_ROUNDS: 12
      CLIENT_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    networks:
      - ice-truck-network
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:5000/api/v1/health']
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend Dashboard ──────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: http://backend:5000
      NEXT_PUBLIC_WS_URL: ws://backend:5000
    depends_on:
      - backend
    networks:
      - ice-truck-network

  # ── Prometheus ──────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    ports:
      - '9090:9090'
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/alerts/alert-rules.yml:/etc/prometheus/alert-rules.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    networks:
      - ice-truck-network

  # ── Grafana ─────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    ports:
      - '3001:3000'
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD in .env}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
      - prometheus
    networks:
      - ice-truck-network

  # ── Nginx Load Balancer ─────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - backend
      - dashboard
    networks:
      - ice-truck-network

volumes:
  pg-data:
  redis-data:
  mosquitto-data:
  mosquitto-log:
  grafana-storage:

networks:
  ice-truck-network:
    driver: bridge
