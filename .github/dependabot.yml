# Dependabot configuration — GitHub Actions version updates
# Renovate handles npm packages; Dependabot covers Actions and Docker
# https://docs.github.com/en/code-security/dependabot

version: 2
updates:
  # ── GitHub Actions ──────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      timezone: Asia/Bangkok
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: 'ci'
      include: scope
    open-pull-requests-limit: 5

  # ── Docker base images ──────────────────────────────────
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      timezone: Asia/Bangkok
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: 'build'
      include: scope

  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
      day: monday
      timezone: Asia/Bangkok
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: 'build'
      include: scope

  - package-ecosystem: docker
    directory: /dashboard
    schedule:
      interval: weekly
      day: monday
      timezone: Asia/Bangkok
    labels:
      - dependencies
      - docker
    commit-message:
      prefix: 'build'
      include: scope
