name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # Weekly Monday 6 AM UTC

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.32.1'

jobs:
  # ── Gitleaks Secret Scanning ─────────────────────────────
  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc
        with:
          args: detect --source . --config .gitleaks.toml --redact --verbose
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: false

  # ── Trivy Filesystem Scan (Backend) ──────────────────────
  trivy-backend:
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Run Trivy filesystem scanner on backend
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8
        with:
          scan-type: fs
          scan-ref: ./backend
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'
        continue-on-error: true
      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@480db559a14342288b67e54bd959dd52dc3ee68f
        if: always() && hashFiles('trivy-backend.sarif') != ''
        with:
          sarif_file: trivy-backend.sarif

  # ── Trivy Filesystem Scan (Dashboard) ───────────────────
  trivy-dashboard:
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Run Trivy filesystem scanner on dashboard
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8
        with:
          scan-type: fs
          scan-ref: ./dashboard
          format: sarif
          output: trivy-dashboard.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'
        continue-on-error: true
      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@480db559a14342288b67e54bd959dd52dc3ee68f
        if: always() && hashFiles('trivy-dashboard.sarif') != ''
        with:
          sarif_file: trivy-dashboard.sarif

  # ── Trivy IaC Scan (Dockerfile + K8s) ───────────────────
  trivy-iac:
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Run Trivy IaC scanner
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-iac.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'
        continue-on-error: true
      - name: Upload Trivy IaC results
        uses: github/codeql-action/upload-sarif@480db559a14342288b67e54bd959dd52dc3ee68f
        if: always() && hashFiles('trivy-iac.sarif') != ''
        with:
          sarif_file: trivy-iac.sarif

  # ── Dependency Audit ─────────────────────────────────────
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: pnpm/action-setup@02f6c237bd2518259fed6c71566509edfb3f2b74
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run pnpm audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

  # ── CodeQL Analysis ──────────────────────────────────────
  codeql:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Initialize CodeQL
        uses: github/codeql-action/init@480db559a14342288b67e54bd959dd52dc3ee68f
        with:
          languages: javascript-typescript
          queries: security-and-quality
      - name: CodeQL Analysis
        uses: github/codeql-action/analyze@480db559a14342288b67e54bd959dd52dc3ee68f
        with:
          category: /language:javascript-typescript

  # ── OWASP Dependency Check ──────────────────────────────
  owasp-dependency-check:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: pnpm/action-setup@02f6c237bd2518259fed6c71566509edfb3f2b74
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Check for known vulnerabilities
        run: npx audit-ci --high
        continue-on-error: true
      - name: License compliance check
        run: npx license-checker --failOn 'GPL-3.0;AGPL-3.0' --summary
        continue-on-error: true

  # ── Security Gate (summary) ───────────────────────────────
  security-gate:
    needs:
      [
        gitleaks,
        trivy-backend,
        trivy-dashboard,
        trivy-iac,
        audit,
        codeql,
        owasp-dependency-check,
      ]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Security summary
        run: |
          echo "## 🔐 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Gitleaks | ${{ needs.gitleaks.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy Backend | ${{ needs.trivy-backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy Dashboard | ${{ needs.trivy-dashboard.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy IaC | ${{ needs.trivy-iac.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| pnpm Audit | ${{ needs.audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL | ${{ needs.codeql.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| OWASP Check | ${{ needs.owasp-dependency-check.result }} |" >> $GITHUB_STEP_SUMMARY
      - name: Fail if critical scans failed
        if: needs.gitleaks.result == 'failure'
        run: exit 1
