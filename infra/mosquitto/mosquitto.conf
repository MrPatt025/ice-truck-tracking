# Eclipse Mosquitto 2.x configuration
# -----------------------------------

# Default MQTT listener
listener 1883
protocol mqtt

# WebSocket listener (for browser clients)
listener 9001
protocol websockets

# Allow anonymous connections (dev/local mode)
# For production: set to false and configure password_file
allow_anonymous true

# Logging
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# Persistence
persistence true
persistence_location /mosquitto/data/

# Message size limit (1 MB)
message_size_limit 1048576

# Connection limits
max_connections -1
