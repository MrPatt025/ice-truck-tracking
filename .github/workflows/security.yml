name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1' # Weekly Monday 6 AM UTC

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.30.3'

jobs:
  # ── Gitleaks Secret Scanning ─────────────────────────────
  gitleaks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        with:
          config-path: .gitleaks.toml

  # ── Trivy Filesystem Scan (Backend) ──────────────────────
  trivy-backend:
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy filesystem scanner on backend
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: ./backend
          format: sarif
          output: trivy-backend.sarif
          severity: CRITICAL,HIGH
        continue-on-error: true
      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-backend.sarif

  # ── Trivy Filesystem Scan (Dashboard) ───────────────────
  trivy-dashboard:
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy filesystem scanner on dashboard
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: ./dashboard
          format: sarif
          output: trivy-dashboard.sarif
          severity: CRITICAL,HIGH
        continue-on-error: true
      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-dashboard.sarif

  # ── Trivy IaC Scan (Dockerfile + K8s) ───────────────────
  trivy-iac:
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy IaC scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-iac.sarif
          severity: CRITICAL,HIGH
        continue-on-error: true
      - name: Upload Trivy IaC results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-iac.sarif

  # ── Dependency Audit ─────────────────────────────────────
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run pnpm audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

  # ── CodeQL Analysis ──────────────────────────────────────
  codeql:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality
      - name: CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:javascript-typescript

  # ── OWASP Dependency Check ──────────────────────────────
  owasp-dependency-check:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Check for known vulnerabilities
        run: npx audit-ci --high
        continue-on-error: true
      - name: License compliance check
        run: npx license-checker --failOn 'GPL-3.0;AGPL-3.0' --summary
        continue-on-error: true

  # ── Security Gate (summary) ───────────────────────────────
  security-gate:
    needs:
      [
        gitleaks,
        trivy-backend,
        trivy-dashboard,
        trivy-iac,
        audit,
        codeql,
        owasp-dependency-check,
      ]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Security summary
        run: |
          echo "## 🔐 Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Gitleaks | ${{ needs.gitleaks.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy Backend | ${{ needs.trivy-backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy Dashboard | ${{ needs.trivy-dashboard.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Trivy IaC | ${{ needs.trivy-iac.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| pnpm Audit | ${{ needs.audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL | ${{ needs.codeql.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| OWASP Check | ${{ needs.owasp-dependency-check.result }} |" >> $GITHUB_STEP_SUMMARY
      - name: Fail if critical scans failed
        if: needs.gitleaks.result == 'failure'
        run: exit 1
