name: Nightly GPU E2E Tests

on:
  schedule:
    - cron: '0 3 * * *' # 3 AM UTC every day
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: nightly-gpu-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '10.32.1'
  CI: 'true'
  NEXT_TELEMETRY_DISABLED: '1'

permissions:
  contents: read

jobs:
  # ── GPU E2E Tests (Full 3D + WebGL) ─────────────────────
  test-e2e-gpu:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - name: Restore Playwright browser cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml', 'dashboard/playwright.gpu.config.ts') }}
      - run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Install Playwright with Chrome
        run: npx playwright install --with-deps chromium

      - name: Run GPU E2E Tests
        run: pnpm --filter @ice-truck/dashboard run test:e2e:gpu
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5000
          NEXT_PUBLIC_WS_URL: ws://localhost:5000

      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        if: always()
        with:
          name: gpu-playwright-report
          path: dashboard/playwright-report/gpu/
          if-no-files-found: ignore

      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        if: always()
        with:
          name: gpu-test-results
          path: dashboard/playwright-results/gpu/
          if-no-files-found: ignore
