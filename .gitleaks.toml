# Gitleaks configuration — pre-commit secret scanning
# https://github.com/gitleaks/gitleaks

title = "Ice Truck Tracking — Secret Scanning"

[allowlist]
  description = "Global allowlist"
  paths = [
    '''pnpm-lock\.yaml''',
    '''\.env\.example''',
    '''\.gitleaks\.toml''',
    '''docs/''',
    '''\.md$''',
  ]

[[rules]]
  id = "generic-api-key"
  description = "Generic API Key"
  regex = '''(?i)(api[_-]?key|apikey)\s*[:=]\s*['"]?([a-zA-Z0-9_\-]{20,})['"]?'''
  tags = ["key", "API"]

[[rules]]
  id = "jwt-secret"
  description = "JWT Secret"
  regex = '''(?i)(jwt[_-]?secret)\s*[:=]\s*['"]?([a-zA-Z0-9_\-!@#$%^&*]{8,})['"]?'''
  tags = ["key", "JWT"]

[[rules]]
  id = "private-key"
  description = "Private Key"
  regex = '''-----BEGIN (RSA |EC |DSA )?PRIVATE KEY-----'''
  tags = ["key", "private"]

[[rules]]
  id = "aws-access-key"
  description = "AWS Access Key"
  regex = '''(?i)aws[_-]?access[_-]?key[_-]?id\s*[:=]\s*['"]?(AKIA[0-9A-Z]{16})['"]?'''
  tags = ["key", "AWS"]

[[rules]]
  id = "aws-secret-key"
  description = "AWS Secret Key"
  regex = '''(?i)aws[_-]?secret[_-]?access[_-]?key\s*[:=]\s*['"]?([a-zA-Z0-9/+=]{40})['"]?'''
  tags = ["key", "AWS"]

[[rules]]
  id = "generic-password"
  description = "Generic Password in Code"
  regex = '''(?i)(password|passwd|pwd)\s*[:=]\s*['"]([^'"]{8,})['"]'''
  tags = ["password"]
  [rules.allowlist]
    regexes = [
      '''your-.*''',
      '''change-this''',
      '''admin123''',
      '''postgres''',
      '''placeholder''',
      '''example''',
    ]
