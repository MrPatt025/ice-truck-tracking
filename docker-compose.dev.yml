# Docker Compose Development Override
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up -d

services:
  postgres:
    ports:
      - '5433:5432'
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}

  redis:
    ports:
      - '6379:6379'

  mosquitto:
    ports:
      - '1883:1883'
      - '9001:9001'

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    environment:
      NODE_ENV: development
      LOG_LEVEL: debug
    volumes:
      - ./backend/src:/app/backend/src
      - ./backend/index.js:/app/backend/index.js
      - node_modules_cache:/app/node_modules
    command: |
      sh -c "npm install -g nodemon && nodemon --exec 'node' backend/index.js"
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
      target: builder
    environment:
      NODE_ENV: development
    volumes:
      - ./dashboard/src:/app/dashboard/src
      - ./dashboard/pages:/app/dashboard/pages
      - ./dashboard/public:/app/dashboard/public
      - node_modules_cache:/app/node_modules
    command: npm run dev
    restart: unless-stopped

  prometheus:
    profiles: []

  grafana:
    profiles: []

volumes:
  node_modules_cache:
    driver: local
