name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_call:
    secrets:
      VERCEL_TOKEN:
        required: false
      VERCEL_ORG_ID:
        required: false
      VERCEL_PROJECT_ID:
        required: false
      RENDER_DEPLOY_HOOK_URL:
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '10.32.1'
  CI: 'true'
  NEXT_TELEMETRY_DISABLED: '1'

jobs:
  # ── Install & Cache ──────────────────────────────────────
  install:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: pnpm/action-setup@71c92474e7e4f5bca283fb17ef80fba9cdb2b4b1
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile --ignore-scripts

  # ── Lint & Type Check ────────────────────────────────────
  lint:
    needs: install
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: pnpm/action-setup@71c92474e7e4f5bca283fb17ef80fba9cdb2b4b1
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm run lint
      - run: pnpm run type-check

  # ── Commitlint (PR only) ────────────────────────────────
  commitlint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@71c92474e7e4f5bca283fb17ef80fba9cdb2b4b1
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }}

  # ── Backend Tests ────────────────────────────────────────
  test-backend:
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    env:
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      USE_FAKE_DB: 'true'
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: pnpm/action-setup@71c92474e7e4f5bca283fb17ef80fba9cdb2b4b1
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: JWT_SECRET="$(openssl rand -hex 32)" pnpm --filter @ice-truck/backend run test -- --ci --coverage --forceExit --testTimeout=15000
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: backend-coverage
          path: backend/coverage/
          if-no-files-found: ignore

  # ── Backend Testcontainers (Real DB) ─────────────────────
  testcontainers-backend:
    needs: lint
    # Guard: only run on develop/feature branches — not on direct pushes/PRs
    # to main, so an unstable Docker environment never blocks the main gate.
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: pnpm/action-setup@71c92474e7e4f5bca283fb17ef80fba9cdb2b4b1
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm --filter @ice-truck/backend run test:containers

  # ── Dashboard Tests ──────────────────────────────────────
  test-dashboard:
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: pnpm/action-setup@71c92474e7e4f5bca283fb17ef80fba9cdb2b4b1
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm --filter @ice-truck/dashboard run test -- --ci --coverage
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        with:
          name: dashboard-coverage
          path: dashboard/coverage/
          if-no-files-found: ignore

  # ── Playwright E2E — Light Profile (every PR) ────────────
  test-e2e-light:
    needs: [test-backend, test-dashboard]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: pnpm/action-setup@71c92474e7e4f5bca283fb17ef80fba9cdb2b4b1
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - name: Restore Playwright browser cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('pnpm-lock.yaml', 'dashboard/playwright.light.config.ts') }}
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Install Playwright browsers
        run: pnpm --filter @ice-truck/dashboard exec playwright install --with-deps chromium firefox
      - name: Run E2E Light Tests (no GPU)
        run: pnpm --filter @ice-truck/dashboard run test:e2e:light
        env:
          E2E_LIGHT: 'true'
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4
        if: always()
        with:
          name: playwright-report-light
          path: dashboard/playwright-report/light/
          if-no-files-found: ignore

  # ── Build All ────────────────────────────────────────────
  build:
    needs: [test-backend, test-dashboard, test-e2e-light]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      NEXT_PUBLIC_API_URL: http://localhost:5000
      NEXT_PUBLIC_WS_URL: ws://localhost:5000
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: pnpm/action-setup@71c92474e7e4f5bca283fb17ef80fba9cdb2b4b1
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm run build

  # ── Preview Deployment (every PR) ────────────────────────
  preview:
    if: github.event_name == 'pull_request'
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    environment: preview
    steps:
      - name: Preview deployment placeholder
        run: |
          echo "Preview deployment job is intentionally disabled in CI."
          echo "Configure deployment in a dedicated workflow with environment-level secrets."

  # ── Deploy Dashboard → Vercel (production) ──────────────
  deploy-dashboard:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: production
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      - uses: pnpm/action-setup@71c92474e7e4f5bca283fb17ef80fba9cdb2b4b1
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Validate Vercel secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }} # NOSONAR
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }} # NOSONAR
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }} # NOSONAR
        run: |
          test -n "$VERCEL_TOKEN"
          test -n "$VERCEL_ORG_ID"
          test -n "$VERCEL_PROJECT_ID"
      - name: Deploy dashboard to Vercel
        working-directory: dashboard
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }} # NOSONAR
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }} # NOSONAR
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }} # NOSONAR
        run: |
          npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          npx vercel build --prod --token="$VERCEL_TOKEN"
          npx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"

  # ── Deploy Backend → Render ─────────────────────────────
  deploy-backend:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: production
    steps:
      - name: Validate Render deploy secret
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }} # NOSONAR
        run: |
          test -n "$RENDER_DEPLOY_HOOK_URL"
      - name: Trigger Render production deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }} # NOSONAR
        run: |
          curl --fail --silent --show-error --max-time 30 -X POST "$RENDER_DEPLOY_HOOK_URL"
